services:
  suitecrm:
    build: ./
    image: suitecrm:latest
    networks:
      - suitecrm_net
    volumes:
      # SuiteCRM application (bind mount to host)
      - ./www:/var/www/html # USE VOLUMES ON COOLIFY
      # SuiteCRM logs (named volume)
      - suitecrm_logs:/var/www/html/SuiteCRM/logs
      - suitecrm_core_log:/var/www/html/SuiteCRM/public/legacy
      # PHP/Apache config and SSL certs are in the image; SSL created by startup.sh if needed
      # Apache log folder (named volume)
      - apache_logs:/var/log/apache2
      # PHP log folder (named volume)
      - php_logs:/var/log/php
    env_file:
      - environment/sample.env
    environment:
      - DATABASE_URL=mysql://${MYSQL_USER:-suitecrm}:${MYSQL_PASSWORD:-suitecrm}@mysql_crm:3306/${MYSQL_DATABASE:-suitecrm}
    ports:
      - "8085:80"
      - "8086:443"
    restart: unless-stopped
    labels:
      - me.titmus.authors="jon@titmus.me"

  mysql_crm:
    image: mysql
    ports:
      - "3806:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-suitecrm}
      - MYSQL_USER=${MYSQL_USER:-suitecrm}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-suitecrm}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-suitecrm}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - suitecrm_net
    restart: unless-stopped
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - mysql_crm
    ports:
      - 8181:80
    environment:
      - PMA_HOST=mysql_crm
      - PMA_USER=${MYSQL_USER:-suitecrm}
      - PMA_PASSWORD=${MYSQL_PASSWORD:-suitecrm}
    networks:
      - suitecrm_net
    restart: no
networks:
  suitecrm_net:
    driver: bridge

volumes:
  suitecrm_logs:
  suitecrm_core_log:
  apache_logs:
  php_logs:
  mysql_data:
