services:
  suitecrm:
    build: ./
    image: suitecrm:latest
    networks:
      - suitecrm_net
    volumes:
      # SuiteCRM application (named volume)
      - suitecrm_www:/var/www/html
      # SuiteCRM logs (named volume)
      - suitecrm_logs:/var/www/html/SuiteCRM/logs
      - suitecrm_core_log:/var/www/html/SuiteCRM/public/legacy
      # PHP config (bind mount for editing)
      - ./docker/config/php/php.ini:/etc/php/8.2/apache2/php.ini
      # APACHE config (bind mount for editing)
      - ./docker/config/apache/apache2.conf:/etc/apache2/apache2.conf
      - ./docker/config/apache/sites.conf:/etc/apache2/sites-enabled/sites.conf
      - ./docker/config/apache/apache-selfsigned.crt:/etc/ssl/certs/apache-selfsigned.crt
      - ./docker/config/apache/apache-selfsigned.key:/etc/ssl/private/apache-selfsigned.key
      # Apache log folder (named volume)
      - apache_logs:/var/log/apache2
      # PHP log folder (named volume)
      - php_logs:/var/log/php
    env_file:
      - environment/sample.env
    ports:
      - "8085:80"
      - "8086:443"
    restart: on-failure
    labels:
      - me.titmus.authors="jon@titmus.me"

  mysql_crm:
    image: mysql
    ports:
      - "3806:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=suitecrm
      - MYSQL_USER=suitecrm
      - MYSQL_PASSWORD=suitecrm
      - MYSQL_DATABASE=suitecrm
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - suitecrm_net
    restart: on-failure
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - mysql_crm
    ports:
      - 8181:80
    environment:
      - PMA_HOST=mysql_crm
      - PMA_USER=suitecrm
      - PMA_PASSWORD=suitecrm
    networks:
      - suitecrm_net
    restart: no
networks:
  suitecrm_net:
    driver: bridge

volumes:
  suitecrm_www:
  suitecrm_logs:
  suitecrm_core_log:
  apache_logs:
  php_logs:
  mysql_data:
