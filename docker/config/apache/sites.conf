<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "/var/www/html/SuiteCRM/public/"

    <Directory "/var/www/html/SuiteCRM/public/">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # When behind a reverse proxy (Coolify, etc.), proxy sends X-Forwarded-Proto: https.
    # Set HTTPS=on so .htaccess and the app do not redirect HTTP to HTTPS (avoids 302 on health checks).
    <IfModule setenvif_module>
        SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1
        SetEnvIf X-Forwarded-Proto "https" HTTPS=on
    </IfModule>

</VirtualHost>

<VirtualHost *:443>
    <Directory /var/www/html/SuiteCRM/public/>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
        ServerName localhost
        DocumentRoot /var/www/html/SuiteCRM/
    <IfModule setenvif_module>
        SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1
    </IfModule>
    
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache-selfsigned.key
    RedirectMatch ^/$ /public/
</VirtualHost>